manifestVersion: 1
name: "@jentz/aws-rds-inventory"
version: "2026.06.07.1"
description: |
  Lists RDS DB clusters in the configured AWS region and emits two
  factory-style resources — one per cluster, one per cluster-member
  instance.

  Pairs with `@jentz/aws-context-guard` upstream in a workflow so a
  misconfigured profile or account can never reach RDS APIs.

  Covers both Aurora and the non-Aurora Multi-AZ DB cluster variants
  exposed by `DescribeDBClusters`. Standalone single-instance RDS (no
  cluster) is out of scope.

  A built-in RDS engine allowlist drops shared-endpoint non-RDS engines
  such as Neptune and DocumentDB before the CEL selector runs. Predicates
  can then filter on engine, member count, instance classes, AWS tags, etc.

  Audit/inventory counterpart to the official `@swamp/aws/rds` dbcluster
  `list` method: this model enriches members, applies an engine allowlist
  and CEL selector, and paginates unbounded for a complete fleet picture,
  rather than feeding the create/update/sync lifecycle. See the README for
  when to use which.

repository: "https://github.com/jentz/swamp-extensions"
homepage: "https://github.com/jentz/swamp-extensions/tree/main/aws-rds-inventory"
paths:
  base: manifest
models:
  - aws_rds_inventory.ts
workflows: []
vaults: []
drivers: []
datastores: []
reports: []
additionalFiles:
  - README.md
  - LICENSE.md
platforms:
  - linux-x86_64
  - linux-aarch64
  - darwin-x86_64
  - darwin-aarch64
labels:
  - aws
  - rds
  - aurora
  - inventory
  - audit
  - cloud
dependencies: []
