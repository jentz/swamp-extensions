name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SWAMP_EXTENSION_REVIEW_DIR: ${{ github.workspace }}/.swamp-reviews
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x
      - uses: systeminit/setup-swamp@8764f3226a675af5b78708adfdee4e13eaa19aac # v0.1.0
      - run: deno fmt --check
      - run: deno lint
      - name: check
        shell: bash
        run: |
          extension_dirs=()
          while IFS= read -r -d '' manifest; do
            extension_dirs+=("$(dirname "$manifest")")
          done < <(
            find . -mindepth 2 -maxdepth 2 -name manifest.yaml \
              -not -path './.swamp/*' \
              -print0 \
            | sort -z
          )
          if [ "${#extension_dirs[@]}" -eq 0 ]; then
            echo "No extension manifests found"
            exit 1
          fi

          check_files="$(mktemp)"
          find -- "${extension_dirs[@]}" -type f \( -name '*.ts' -o -name '*.tsx' \) \
            -print0 > "$check_files"
          if [ ! -s "$check_files" ]; then
            echo "No TypeScript files found under extension manifests"
            exit 1
          fi
          xargs -0 -n 50 deno check < "$check_files"
      - name: manifest fmt
        shell: bash
        run: |
          manifests=()
          while IFS= read -r -d '' manifest; do
            manifests+=("$manifest")
          done < <(
            find . -mindepth 2 -maxdepth 2 -name manifest.yaml \
              -not -path './.swamp/*' \
              -print0 \
            | sort -z
          )
          if [ "${#manifests[@]}" -eq 0 ]; then
            echo "No extension manifests found"
            exit 1
          fi

          for manifest in "${manifests[@]}"; do
            echo "Checking $manifest"
            swamp extension fmt "$manifest" --check
          done
      - name: extension package gates
        shell: bash
        run: |
          manifests=()
          while IFS= read -r -d '' manifest; do
            manifests+=("$manifest")
          done < <(
            find . -mindepth 2 -maxdepth 2 -name manifest.yaml \
              -not -path './.swamp/*' \
              -print0 \
            | sort -z
          )
          if [ "${#manifests[@]}" -eq 0 ]; then
            echo "No extension manifests found"
            exit 1
          fi

          for manifest in "${manifests[@]}"; do
            echo "Quality $manifest"
            swamp extension quality "$manifest"
            echo "Dry-run push $manifest"
            swamp extension push "$manifest" --dry-run --yes
          done
      - name: test
        run: |
          deno test \
            --allow-read --allow-write --allow-env --allow-net --no-check \
            aws-context-guard/ \
            aws-rds-inventory/ \
            aws-s3-bucket-audit/ \
            aws-rds-reservations/ \
            aws-rds-reservation-coverage/ \
            aws-vpc-inventory/ \
            aws-vpc-inventory-report/ \
            aws-default-sg-audit/ \
            aws-default-sg-audit-report/ \
            aws-stackset-audit/ \
            aws-stackset-drift-detect/ \
            aws-iam-role-audit/ \
            aws-integration-coverage/
