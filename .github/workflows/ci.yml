name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno fmt --check --ignore=.swamp.yaml,.swamp/,.swamp-sources.yaml
      - run: deno lint --ignore=.swamp/
      - name: test
        run: |
          deno test \
            --allow-read --allow-write --allow-env --allow-net --no-check \
            aws-context-guard/tests/ \
            aws-s3-bucket-audit/tests/
