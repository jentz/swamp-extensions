name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x
      - run: deno fmt --check
      - run: deno lint
      - name: test
        run: |
          deno test \
            --allow-read --allow-write --allow-env --allow-net --no-check \
            aws-context-guard/ \
            aws-rds-inventory/ \
            aws-s3-bucket-audit/ \
            aws-rds-reservations/ \
            aws-rds-reservation-coverage/
