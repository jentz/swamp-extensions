name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SWAMP_EXTENSION_REVIEW_DIR: ${{ github.workspace }}/.swamp-reviews
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: v2.x
      - uses: systeminit/setup-swamp@c2608c1441f5ffe82b91487ae61736661a3e242b # v0.1.1
      - run: deno fmt --check
      - run: deno lint
      - name: sync-lib drift
        # Fail if any generated per-package `_lib` copy has drifted from its
        # canonical source under repo-root `_lib/`. Mirrored in scripts/check.sh.
        # Read-only (--check never writes), so the gate cannot self-heal drift.
        run: deno run --allow-read scripts/sync-lib.ts --check
      - name: check
        shell: bash
        run: |
          extension_dirs=()
          while IFS= read -r -d '' manifest; do
            extension_dirs+=("$(dirname "$manifest")")
          done < <(
            find . -mindepth 2 -maxdepth 2 -name manifest.yaml \
              -not -path './.swamp/*' \
              -print0 \
            | sort -z
          )
          if [ "${#extension_dirs[@]}" -eq 0 ]; then
            echo "No extension manifests found"
            exit 1
          fi

          check_files="$(mktemp)"
          find -- "${extension_dirs[@]}" -type f \( -name '*.ts' -o -name '*.tsx' \) \
            -print0 > "$check_files"
          if [ ! -s "$check_files" ]; then
            echo "No TypeScript files found under extension manifests"
            exit 1
          fi
          xargs -0 -n 50 deno check < "$check_files"

          # The canonical shared `_lib/` lives at the repo root with no
          # manifest.yaml, so the enumeration above does not reach it. Type-check
          # it explicitly. Mirrored in scripts/check.sh.
          deno check _lib/*.ts
      - name: doc lint
        shell: bash
        # Scope: every exported symbol in all TypeScript under manifest-owned
        # extension dirs, including `_lib` helpers. Repo-local tooling outside
        # extension dirs has no manifest.yaml, so it is naturally excluded.
        run: |
          extension_dirs=()
          while IFS= read -r -d '' manifest; do
            extension_dirs+=("$(dirname "$manifest")")
          done < <(
            find . -mindepth 2 -maxdepth 2 -name manifest.yaml \
              -not -path './.swamp/*' \
              -print0 \
            | sort -z
          )
          if [ "${#extension_dirs[@]}" -eq 0 ]; then
            echo "No extension manifests found"
            exit 1
          fi

          # One `deno doc --lint` invocation per extension dir. Each extension
          # is an independent package, so its files form one doc graph.
          # Batching files across packages into fixed-size chunks let the
          # byte-identical generated `_lib` twins of different packages share
          # an invocation, which makes deno doc misreport exported twin types
          # as private (private-type-ref) depending on filesystem enumeration
          # order — the gate went red or green per machine. Mirrored in
          # scripts/check.sh.
          doc_total=0
          for dir in "${extension_dirs[@]}"; do
            doc_files=()
            while IFS= read -r -d '' file; do
              doc_files+=("$file")
            done < <(
              find "$dir" -type f \( -name '*.ts' -o -name '*.tsx' \) -print0 \
              | sort -z
            )
            if [ "${#doc_files[@]}" -eq 0 ]; then
              continue
            fi
            deno doc --lint "${doc_files[@]}"
            doc_total=$((doc_total + ${#doc_files[@]}))
          done
          if [ "$doc_total" -eq 0 ]; then
            echo "No TypeScript files found under extension manifests"
            exit 1
          fi

          # Doc-lint the canonical shared `_lib/` source modules (no manifest,
          # so the enumeration above does not reach them). Mirrored in
          # scripts/check.sh.
          deno doc --lint _lib/scan_error.ts _lib/aws_credentials.ts
      - name: manifest fmt
        shell: bash
        run: |
          manifests=()
          while IFS= read -r -d '' manifest; do
            manifests+=("$manifest")
          done < <(
            find . -mindepth 2 -maxdepth 2 -name manifest.yaml \
              -not -path './.swamp/*' \
              -print0 \
            | sort -z
          )
          if [ "${#manifests[@]}" -eq 0 ]; then
            echo "No extension manifests found"
            exit 1
          fi

          for manifest in "${manifests[@]}"; do
            echo "Checking $manifest"
            swamp extension fmt "$manifest" --check
          done
      - name: extension package gates
        shell: bash
        run: |
          manifests=()
          while IFS= read -r -d '' manifest; do
            manifests+=("$manifest")
          done < <(
            find . -mindepth 2 -maxdepth 2 -name manifest.yaml \
              -not -path './.swamp/*' \
              -print0 \
            | sort -z
          )
          if [ "${#manifests[@]}" -eq 0 ]; then
            echo "No extension manifests found"
            exit 1
          fi

          stale_manifests=()
          stale_packages=()
          push_out="$(mktemp)"
          # Always remove the temp file, whichever path the step exits on
          # (normal completion, a dry-run push failure, or an earlier command
          # such as `swamp extension quality`).
          trap 'rm -f "$push_out"' EXIT

          for manifest in "${manifests[@]}"; do
            echo "Quality $manifest"
            swamp extension quality "$manifest"

            echo "Dry-run push $manifest"
            # Capture the dry-run JSON stream (stdout) so it can be parsed
            # for adversarial-review warnings. A stale or missing committed
            # review only WARNS (exit 0) via reviewRuleWarnings, whereas a
            # genuine push error exits non-zero. Capture the exit code
            # explicitly so real failures still fail the step, while the
            # warning is detected by parsing the JSON.
            push_status=0
            swamp extension push "$manifest" --dry-run --json --yes \
              >"$push_out" || push_status=$?
            if [ "$push_status" -ne 0 ]; then
              echo "::error::Dry-run push failed for $manifest (exit $push_status)"
              cat "$push_out"
              exit "$push_status"
            fi

            # The adversarial-review warning object carries no extension
            # name, so derive the package name from the dry_run status
            # object in the same stream when the warning is present.
            review_file="$(
              jq -rc 'select(.reviewRuleWarnings)
                      | .reviewRuleWarnings[]
                      | select(.ruleId == "adversarial-review-report")
                      | .file' "$push_out"
            )"
            if [ -n "$review_file" ]; then
              package_name="$(
                jq -rc -s 'first(.[] | select(.status == "dry_run") | .name)
                           // empty' "$push_out"
              )"
              [ -n "$package_name" ] || package_name="(unknown package)"
              echo "::warning::Stale or missing adversarial review for $manifest ($package_name)"
              stale_manifests+=("$manifest")
              stale_packages+=("$package_name")
            fi
          done

          if [ "${#stale_manifests[@]}" -ne 0 ]; then
            echo ""
            echo "=============================================================="
            echo "Adversarial-review gate FAILED."
            echo ""
            echo "The committed adversarial review under .swamp-reviews/ is"
            echo "stale or missing for the following extension(s):"
            echo ""
            for i in "${!stale_manifests[@]}"; do
              echo "  - ${stale_manifests[$i]}  (${stale_packages[$i]})"
            done
            echo ""
            echo "The review report is bound to a content hash of each"
            echo "extension's source and manifest, so any change (including a"
            echo "version bump) invalidates it. Regenerate the affected"
            echo "review(s) by following the steps in .swamp-reviews/README.md,"
            echo "then commit the refreshed report(s) (and delete the stale"
            echo "one(s))."
            echo "=============================================================="
            exit 1
          fi

          echo "All extensions have a current committed adversarial review."
      - name: test
        shell: bash
        run: |
          extension_dirs=()
          while IFS= read -r -d '' manifest; do
            extension_dirs+=("$(dirname "$manifest")")
          done < <(
            find . -mindepth 2 -maxdepth 2 -name manifest.yaml \
              -not -path './.swamp/*' \
              -print0 \
            | sort -z
          )
          if [ "${#extension_dirs[@]}" -eq 0 ]; then
            echo "No extension manifests found"
            exit 1
          fi

          # The canonical `_lib/` is included explicitly (no manifest, so it is
          # not in the enumerated extension dirs) so its unit suites run here
          # and in scripts/check.sh.
          deno test \
            --allow-read --allow-write --allow-env --allow-net --no-check \
            --coverage=coverage \
            _lib/ "${extension_dirs[@]}"

          # Coverage is observability-only: print a summary to logs and the
          # job summary. Enforcing a minimum threshold is intentionally OUT of
          # scope (deno coverage has no native fail-under-threshold flag).
          NO_COLOR=1 deno coverage coverage | tee coverage/summary.txt
          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            {
              echo '### Test coverage'
              echo '```text'
              cat coverage/summary.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
