name: publish

on:
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect extensions to publish
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      extensions: ${{ steps.changes.outputs.extensions }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: systeminit/setup-swamp@8764f3226a675af5b78708adfdee4e13eaa19aac # v0.1.0
        with:
          api-key: ${{ secrets.SWAMP_API_KEY }}
      - id: changes
        name: Find extensions whose manifest version is not yet published
        shell: bash
        run: |
          # The manifest `version` is the release signal: publish any extension
          # whose declared version differs from the version currently in the
          # registry. This compares each manifest against the registry rather
          # than a git diff of the last commit, so it is robust to merge
          # strategy — a squash, a merge commit, AND a rebase merge all publish
          # correctly (a rebase merge that lands the manifest bump below the top
          # commit previously published nothing), and it self-heals any manifest
          # that was bumped but never reached the registry. Re-runs are
          # idempotent: an already-published version is skipped.
          extensions="[]"
          while IFS= read -r -d '' manifest; do
            manifest="${manifest#./}"
            dir="$(dirname "$manifest")"
            # awk exits 0 even when no version line matches (yielding an empty
            # string, handled just below), so this survives bash `-e -o
            # pipefail`; tr strips either single- or double-quoted YAML values.
            manifest_version="$(
              awk '/^version:/ { print $2; exit }' "$manifest" | tr -d "\"'"
            )"
            if [ -z "$manifest_version" ]; then
              echo "::warning file=$manifest::no version scalar found; skipping"
              continue
            fi
            published="$(
              swamp extension version --manifest "$manifest" --json \
                | jq -r '.currentPublished // ""'
            )"
            if [ "$manifest_version" != "$published" ]; then
              extensions="$(jq -c --arg dir "$dir" '. + [$dir]' <<< "$extensions")"
              echo "Will publish: $dir (manifest=$manifest_version, published=${published:-<none>})"
            else
              echo "Up to date: $dir ($published)"
            fi
          done < <(
            find . -mindepth 2 -maxdepth 2 -name manifest.yaml \
              -not -path './.swamp/*' \
              -print0 \
            | sort -z
          )

          echo "extensions=$extensions" >> "$GITHUB_OUTPUT"
          echo "Extensions to publish: $extensions"

  publish:
    name: Publish ${{ matrix.extension }}
    needs: detect-changes
    if: needs.detect-changes.outputs.extensions != '[]'
    runs-on: ubuntu-latest
    env:
      SWAMP_EXTENSION_REVIEW_DIR: ${{ github.workspace }}/.swamp-reviews
    strategy:
      fail-fast: false
      matrix:
        extension: ${{ fromJson(needs.detect-changes.outputs.extensions) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: systeminit/setup-swamp@8764f3226a675af5b78708adfdee4e13eaa19aac # v0.1.0
        with:
          api-key: ${{ secrets.SWAMP_API_KEY }}
      - name: Publish extension
        run: swamp extension push "${{ matrix.extension }}/manifest.yaml" --yes
