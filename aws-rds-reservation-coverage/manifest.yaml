manifestVersion: 1
name: "@jentz/aws-rds-reservation-coverage"
version: "2026.06.06.1"
description: |
  Workflow-scope report that normalizes running and reserved RDS capacity into
  size-flexible "large-equivalent" units and reports the running-minus-reserved
  coverage gap per region × family × engine × deployment. Consumes the
  `instance`, `reserved`, and `scan_error` resources produced earlier in the
  workflow by `@jentz/aws-rds-reservations`. Pure data shaping — no AWS API
  access.

  A "large-equivalent" rescales AWS's normalized-unit scheme so a `large` is 1
  unit, doubling per size step (xlarge 2, 2xlarge 4, …). Within a family this is
  exactly the granularity RDS size-flexible reservations apply at, so each
  bucket maps to a purchasable line item: running_large_eq − reserved_large_eq =
  the coverage gap (positive = buy more, negative = over-reserved).

  Burstable (t-class) and serverless capacity are carved out (reported
  separately, never folded into large-equivalents); only active reservations
  count toward coverage. A per-account breakdown covers the case where RI
  discount sharing is disabled.

  Emits `markdown` and `json` artifacts. The companion collector model is
  `@jentz/aws-rds-reservations`.
repository: "https://github.com/jentz/swamp-extensions"
homepage: "https://github.com/jentz/swamp-extensions/tree/main/aws-rds-reservation-coverage"
paths:
  base: manifest
models: []
workflows: []
vaults: []
drivers: []
datastores: []
reports:
  - aws_rds_reservation_coverage.ts
additionalFiles:
