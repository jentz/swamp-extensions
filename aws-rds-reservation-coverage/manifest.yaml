manifestVersion: 1
name: "@jentz/aws-rds-reservation-coverage"
version: "2026.06.06.2"
description: |
  Workflow-scope report that normalizes running and reserved RDS capacity into
  size-flexible "large-equivalent" units and reports the running-minus-reserved
  coverage gap per region × family × engine × deployment. Consumes the
  `instance`, `reserved`, and `scan_error` resources produced earlier in the
  workflow by `@jentz/aws-rds-reservations`. Pure data shaping — no AWS API
  access.

  A "large-equivalent" rescales AWS's normalized-unit table so a Single-AZ
  `large` is 1 unit, doubling per size step (xlarge 2, 2xlarge 4, …); a Multi-AZ
  instance deployment counts 2× the same-size Single-AZ. Aurora has no Multi-AZ
  DB instance reservation, so Aurora is forced to Single-AZ and never doubled.
  Each bucket maps to a purchasable line item: running_large_eq −
  reserved_large_eq = the coverage gap (positive = buy more, negative =
  over-reserved). Netting is bucket-local; the generation rollup sums the
  now-commensurable units for the headline cross-deployment gap.

  The engine token preserves edition and license for the commercial engines
  (oracle-ee-byol, oracle-se2-li, sqlserver-se-li), so a reservation only nets
  against capacity it can actually cover. Size flexibility applies only to
  MySQL, MariaDB, PostgreSQL, Db2, Aurora, and Oracle BYOL; SQL Server, Oracle
  License-Included, and RDS Custom are not size-flexible and are carved out as
  raw counts alongside burstable (t-class) and serverless capacity, never folded
  into large-equivalents. Only active reservations count toward coverage. A
  per-account breakdown covers the case where RI discount sharing is disabled.

  Emits `markdown` and `json` artifacts. The companion collector model is
  `@jentz/aws-rds-reservations`.
repository: "https://github.com/jentz/swamp-extensions"
homepage: "https://github.com/jentz/swamp-extensions/tree/main/aws-rds-reservation-coverage"
